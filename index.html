<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DELATRAP — Neon Trap Train</title>
<style>
  /* Lyrics font */
  @font-face {
    font-family: 'SacraSpina';
    src: url('fonts/sacra-spina.ttf') format('truetype');
    font-display: block;
  }
  /* Brand font (DELATRAP + AICANFEEL signboards) */
  @font-face {
    font-family: 'UrbanStarblues';
    src: url('fonts/urban-starblues.otf') format('opentype');
    font-display: block;
  }
  /* Lyrics font (word clouds) */
  @font-face {
    font-family: 'Bilderberg';
    src: url('fonts/bilderberg-italic.otf') format('opentype');
    font-display: block;
  }
  :root {
    --pink: #ff2ed9;
    --cyan: #45e8ff;
    --deep: #0c0418;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--deep); }
  body { font-family: 'Segoe UI', system-ui, sans-serif; color: #f3e8ff; }
  canvas { display: block; }
  #scene { position: fixed; inset: 0; cursor: grab; }
  #scene.dragging { cursor: grabbing; }

  /* cinematic vignette + faint scanlines */
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: radial-gradient(ellipse at 50% 42%, transparent 52%, rgba(5,0,16,.42) 88%, rgba(3,0,12,.72) 100%);
  }
  #vignette::after {
    content: ''; position: absolute; inset: 0; opacity: .05;
    background: repeating-linear-gradient(0deg, transparent 0 3px, #000 3px 4px);
  }

  .gta {
    font-family: 'UrbanStarblues', 'Haettenschweiler', 'Arial Black', Impact, sans-serif;
    font-weight: 900; letter-spacing: .02em;
  }

  /* ============ LIQUID GLASS SYSTEM ============ */
  .glass {
    position: relative;
    background: linear-gradient(155deg, rgba(60,30,90,.34), rgba(20,10,40,.22));
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    border: 1px solid rgba(255,255,255,.16);
    border-radius: 22px;
    box-shadow:
      0 8px 40px rgba(0,0,0,.45),
      inset 0 1px 0 rgba(255,255,255,.35),
      inset 0 -18px 40px rgba(120,40,200,.10);
    overflow: hidden;
    /* promote to its own compositor layer — prevents backdrop-filter black-flicker over WebGL */
    transform: translateZ(0);
    isolation: isolate;
    -webkit-backface-visibility: hidden; backface-visibility: hidden;
  }
  /* top sheen */
  .glass::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; border-radius: inherit;
    background: linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,0) 42%);
    opacity: .85;
  }
  /* moving specular streak — animate transform (compositor-only) to avoid repaint flicker */
  .glass::after {
    content: ''; position: absolute; top: 0; bottom: 0; left: 0; width: 55%; pointer-events: none;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.13), transparent);
    will-change: transform;
    animation: sheen 7.5s ease-in-out infinite;
  }
  @keyframes sheen { 0%,70% { transform: translateX(-160%) skewX(-18deg); } 90%,100% { transform: translateX(360%) skewX(-18deg); } }

  /* ---------- start overlay (glass hero over live scene) ---------- */
  #ov {
    position: fixed; inset: 0; z-index: 50; display: flex;
    align-items: center; justify-content: center; text-align: center;
    background: radial-gradient(ellipse at 50% 46%, rgba(12,4,28,.30) 0%, rgba(8,2,20,.62) 100%);
    transition: opacity .6s ease;
  }
  #ov.hide { opacity: 0; pointer-events: none; }
  #hero {
    width: min(560px, 90vw); padding: 44px 40px 38px; border-radius: 34px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    animation: heroIn 1s cubic-bezier(.2,.9,.25,1) both;
  }
  @keyframes heroIn { from { opacity: 0; transform: translateY(26px) scale(.94); } to { opacity: 1; transform: none; } }
  #hero .eyebrow {
    font-size: 12px; letter-spacing: .55em; color: #9fe9ff; text-indent: .55em;
    text-shadow: 0 0 14px rgba(69,232,255,.7);
  }
  #hero h1 {
    font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 800; font-style: italic;
    font-size: clamp(42px, 9vw, 86px); line-height: .9; letter-spacing: .03em; text-indent: .03em; color: #fff;
    background: linear-gradient(180deg, #fff 8%, #ffd0f3 42%, #ff2ed9 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(255,46,217,.6)) drop-shadow(0 4px 10px rgba(0,0,0,.5));
  }
  #hero .sub {
    font-size: clamp(11px, 2vw, 15px); color: #d6c4f2; letter-spacing: .34em;
    text-indent: .34em; margin-top: -2px;
  }
  #startBtn {
    margin-top: 12px; padding: 15px 48px; font-size: 16px; cursor: pointer;
    font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 700; letter-spacing: .26em; text-indent: .26em;
    color: #fff; border-radius: 999px; position: relative; overflow: hidden;
    background: linear-gradient(180deg, rgba(255,90,222,.55), rgba(150,30,220,.4));
    border: 1px solid rgba(255,190,242,.7);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 6px 26px rgba(255,46,217,.4), inset 0 1px 6px rgba(255,255,255,.55);
    transition: transform .18s ease, box-shadow .18s ease, background .18s;
  }
  #startBtn:hover:not(:disabled) { transform: translateY(-2px) scale(1.05); box-shadow: 0 10px 40px rgba(255,46,217,.7), inset 0 1px 8px rgba(255,255,255,.7); }
  #startBtn:disabled { opacity: .6; cursor: wait; }
  #hero .hint { font-size: 11px; color: #9c8ac0; letter-spacing: .12em; margin-top: 6px; line-height: 1.7; }
  #hero .hint b { color: #cfe9ff; font-weight: 600; }
  .eqmini { display: inline-flex; gap: 3px; height: 12px; align-items: flex-end; vertical-align: middle; margin: 0 8px; }
  .eqmini i { width: 3px; background: #45e8ff; border-radius: 2px; box-shadow: 0 0 6px #45e8ff; animation: eq 1s ease-in-out infinite; }
  .eqmini i:nth-child(2){ animation-delay: .18s } .eqmini i:nth-child(3){ animation-delay: .36s } .eqmini i:nth-child(4){ animation-delay: .54s }
  @keyframes eq { 0%,100% { height: 25% } 50% { height: 100% } }

  /* ---------- HUD: compact glass player pill ---------- */
  #hud {
    position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%) translateY(24px) translateZ(0);
    z-index: 10; width: min(468px, 92vw); padding: 9px 12px 10px;
    display: flex; flex-direction: column; gap: 7px; opacity: 0; transition: opacity .6s, transform .6s;
    border-radius: 18px; will-change: transform;
  }
  body.playing #hud { opacity: 1; transform: translateX(-50%) translateY(0) translateZ(0); }
  #bar { width: 100%; height: 12px; cursor: pointer; display: flex; align-items: center; }
  #bar .track { width: 100%; height: 4px; border-radius: 5px; background: rgba(255,255,255,.14); overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,.4); }
  #bar .fill {
    width: 0%; height: 100%; border-radius: 5px;
    background: linear-gradient(90deg, #45e8ff, #8fd0ff);
    box-shadow: 0 0 10px rgba(69,232,255,.7);
  }
  #row { display: flex; align-items: center; gap: 8px; }
  .transport { display: flex; align-items: center; gap: 5px; }
  #trackmini { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1; }
  #trackmini .cov {
    width: 30px; height: 30px; border-radius: 9px; flex: none; position: relative; overflow: hidden;
    background: linear-gradient(150deg, #2b1740, #17233f);
    border: 1px solid rgba(160,210,255,.25);
    box-shadow: inset 0 1px 3px rgba(255,255,255,.2);
    display: flex; align-items: center; justify-content: center;
  }
  #trackmini .cov b { font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 800; font-style: italic; font-size: 15px; color: #bfe6ff; text-shadow: 0 0 8px rgba(69,232,255,.6); }
  #trackmini .meta { min-width: 0; }
  #trackmini .t { font-size: 12px; color: #eaf4ff; letter-spacing: .02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #trackmini .a { font-size: 9.5px; color: #8fa6c8; letter-spacing: .05em; }
  #time { font-size: 10.5px; letter-spacing: .08em; color: #9fb4d4; font-variant-numeric: tabular-nums; white-space: nowrap; margin-left: 2px; }
  .ctrls { display: flex; align-items: center; gap: 5px; }
  /* single-color icon buttons */
  .ibtn {
    width: 29px; height: 29px; flex: none; display: grid; place-items: center; cursor: pointer;
    color: #cfe4f7; border-radius: 50%; user-select: none;
    background: rgba(255,255,255,.06); border: 1px solid rgba(180,210,240,.18);
    transition: background .15s, border-color .15s, box-shadow .15s, color .15s; -webkit-tap-highlight-color: transparent;
  }
  .ibtn svg { width: 14px; height: 14px; display: block; }
  .ibtn:hover { background: rgba(120,200,255,.16); border-color: rgba(150,220,255,.55); color: #eaf7ff; box-shadow: 0 0 12px rgba(90,200,255,.4); }
  .ibtn.play { width: 34px; height: 34px; background: rgba(150,220,255,.14); border-color: rgba(150,220,255,.4); color: #eaf7ff; }
  .ibtn.play svg { width: 16px; height: 16px; }
  .ibtn.off { color: #62708a; background: rgba(255,255,255,.03); border-color: rgba(255,255,255,.08); box-shadow: none; }
  .ibtn.off:hover { box-shadow: none; color: #7c8aa4; }

  /* ---------- brand tag (top left) ---------- */
  #brand {
    position: fixed; top: 18px; left: 18px; z-index: 10; opacity: 0; transition: opacity .6s;
    padding: 8px 15px 9px; border-radius: 15px; display: flex; flex-direction: column; gap: 1px;
    pointer-events: none;
  }
  #brand b { font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 800; font-style: italic; font-size: clamp(16px, 2.2vw, 21px); color: #ff2ed9; text-shadow: 0 0 12px rgba(255,46,217,.8); line-height: 1; }
  #brand small { font-size: 9px; color: #7fe6ff; letter-spacing: .42em; text-indent: .42em; text-shadow: 0 0 8px rgba(69,232,255,.7); }
  body.playing #brand { opacity: 1; }

  @media (max-width: 560px) {
    #trackmini .a { display: none; }
    #time { display: none; }
  }

  #err {
    position: fixed; top: 12px; right: 14px; z-index: 60; max-width: 420px; display: none;
    padding: 10px 14px; font-size: 12px; background: #3a0a1acc; border: 1px solid #ff4b7d;
    border-radius: 10px; color: #ffd7e2; white-space: pre-wrap;
  }
</style>
</head>
<body>
<div id="scene"></div>
<div id="vignette"></div>

<div id="brand" class="glass"><b>DELATRAP</b><small>NEON TRAP TRAIN</small></div>

<div id="hud" class="glass">

</div>

<div id="ov">

    <div class="eyebrow">AICANFEEL&nbsp;&nbsp;PRESENTS</div>

    <div class="sub">NEON&nbsp;TRAP&nbsp;TRAIN&nbsp;·&nbsp;ENDLESS&nbsp;RIDE</div>
    <button id="startBtn" disabled>LOADING…</button>
    <div class="hint"><b>DRAG</b> ORBIT&nbsp;&nbsp;·&nbsp;&nbsp;<b>SCROLL</b> ZOOM&nbsp;&nbsp;·&nbsp;&nbsp;<b>SPACE</b> PAUSE<br>
      headphones recommended<span class="eqmini"><i></i><i></i><i></i><i></i></span>sound on</div>
  </div>
</div>

<div id="err"></div>

<audio id="song" src="Delatrap.mp3" preload="auto" loop></audio>

/* ============================== RENDERER ============================== */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(COL.fog, 0.0062);

const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.1, 1400);
const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false, stencil: false, powerPreference: 'high-performance' });
const DPR = Math.min(devicePixelRatio, 2);
renderer.setPixelRatio(DPR);
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.28;
document.getElementById('scene').appendChild(renderer.domElement);

const rt = new THREE.WebGLRenderTarget(innerWidth, innerHeight, { type: THREE.HalfFloatType, samples: 4 });
const composer = new EffectComposer(renderer, rt);
composer.setPixelRatio(DPR);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.62, 0.48, 0.6);
composer.addPass(bloom);
composer.addPass(new OutputPass());

function resizeAll() {
  const w = innerWidth, h = innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setPixelRatio(DPR);
  renderer.setSize(w, h);
  composer.setPixelRatio(DPR);
  composer.setSize(w, h);
  bloom.setSize(w, h);
}
addEventListener('resize', resizeAll);

/* ============================== SKY / SUN / HORIZON ============================== */
function skyTexture() {
  const c = document.createElement('canvas'); c.width = 16; c.height = 512;
  const g = c.getContext('2d');
  /* sphere v=1 is the zenith and v=0.5 the horizon, so squeeze the whole
     gradient into the top half of the canvas */
  const grad = g.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0.00, '#1b0b40');
  grad.addColorStop(0.20, '#26104e');
  grad.addColorStop(0.33, '#341463');
  grad.addColorStop(0.42, '#471767');
  grad.addColorStop(0.465, '#6f1b7f');

/* striped synthwave sun */
function sunTexture() {
  const S = 512, c = document.createElement('canvas'); c.width = c.height = S;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(S/2, S/2, S*0.05, S/2, S/2, S*0.48);
  grad.addColorStop(0, '#ff9bdf');
  grad.addColorStop(0.45, '#ff37c4');
  grad.addColorStop(0.8, '#f011a8');
  grad.addColorStop(1, '#d10f92');
  g.fillStyle = grad;
  g.beginPath(); g.arc(S/2, S/2, S*0.48, 0, Math.PI*2); g.fill();
  /* stripe gaps, widening downward */
  g.globalCompositeOperation = 'destination-out';
  let y = S * 0.36, h = S * 0.014;
  while (y < S * 0.96) { g.fillRect(0, y, S, h); y += h + S * 0.05; h *= 1.6; }
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
function glowTexture(color, inner = 0.0) {
  const S = 256, c = document.createElement('canvas'); c.width = c.height = S;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(S/2, S/2, S*inner, S/2, S/2, S/2);
  grad.addColorStop(0, color);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = grad; g.fillRect(0, 0, S, S);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

    const post = cyl(0.05, 0.075, 5.0, 6, matDark); post.position.y = 2.5; p.add(post);

/* --- DELATRAP boxcar --- */
function delatrapTexture() {
  const W = 1024, H = 300;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const g = c.getContext('2d');
  g.clearRect(0, 0, W, H);
  const word = 'DELATRAP';
  g.textBaseline = 'middle';
  let x = 46;
  const widths = [];
  for (let i = 0; i < word.length; i++) {
    const size = 148 + Math.sin(i * 2.4) * 16;
    g.font = `900 ${size}px ${BRAND_FONT}`;
    widths.push(g.measureText(word[i]).width);
  }
  for (let i = 0; i < word.length; i++) {
    const size = 148 + Math.sin(i * 2.4) * 16;
    const rot = Math.sin(i * 1.7) * 0.1;
    const yy = H / 2 + Math.sin(i * 2.1) * 10;
    g.save();
    g.translate(x + widths[i] / 2, yy);
    g.rotate(rot);
    g.font = `900 ${size}px ${BRAND_FONT}`;
    g.textAlign = 'center';
    g.shadowColor = '#d02bff'; g.shadowBlur = 34;
    g.lineJoin = 'round';
    g.strokeStyle = '#6a0aa8'; g.lineWidth = 20;
    g.strokeText(word[i], 0, 0);
    g.shadowBlur = 0;
    const lg = g.createLinearGradient(0, -size / 2, 0, size / 2);
    lg.addColorStop(0, '#ffb8f2'); lg.addColorStop(0.55, '#ff44d8'); lg.addColorStop(1, '#c519ff');
    g.fillStyle = lg;
    g.fillText(word[i], 0, 0);
    /* paint drips */
    if (i % 3 === 0) {
      g.fillRect(-size * 0.18, size * 0.34, 7, 26 + (i * 7) % 22);
    }
    g.restore();
    x += widths[i] - 6;
  }
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = 4;
  return t;
}

/* ============================== LYRIC CLOUDS ============================== */
const ADLIB_GOLD = /gold|bling/i, ADLIB_ICE = /\bice\b|\biced?y?\b|diamond/i;
function makeLyricTexture(text, shown, style) {
  const words = titleCase(text).split(' ');
  let px = style.adlib ? 176 : 124;
  /* layout into 1-2 lines */
  let lines;
  if (words.length > 4) {
    const cut = Math.ceil(words.length / 2);
    lines = [words.slice(0, cut), words.slice(cut)];
  } else lines = [words];

  const c = document.createElement('canvas');
  const g = c.getContext('2d');
  const font = (p) => `${p}px ${LYRIC_FONT}`;
  g.font = font(px);
  let maxW = 0;
  for (const ln of lines) maxW = Math.max(maxW, g.measureText(ln.join(' ')).width);
  if (maxW > 1350) { px = Math.floor(px * 1350 / maxW); g.font = font(px); maxW = 0; for (const ln of lines) maxW = Math.max(maxW, g.measureText(ln.join(' ')).width); }
  const pad = px * 0.55;
  c.width = Math.ceil(maxW + pad * 2);
  c.height = Math.ceil(lines.length * px * 1.14 + pad * 1.4);

  const ctx = c.getContext('2d');
  ctx.font = font(px);
  ctx.textBaseline = 'alphabetic';
  ctx.lineJoin = 'round';
  try { ctx.letterSpacing = '0px'; } catch (e) {}

  let wi = 0;
  for (let li = 0; li < lines.length; li++) {
    const ln = lines[li];
    const lineW = ctx.measureText(ln.join(' ')).width;
    let x = (c.width - lineW) / 2;
    const y = pad * 0.5 + px * (li + 0.95);
    for (const word of ln) {
      const wW = ctx.measureText(word + ' ').width;
      if (wi < shown) {
        /* glow + outline */
        ctx.shadowColor = style.glow; ctx.shadowBlur = px * 0.3;
        ctx.strokeStyle = '#0a0014'; ctx.lineWidth = px * 0.17;
        ctx.strokeText(word, x, y);
        ctx.shadowBlur = 0;
        const lg = ctx.createLinearGradient(0, y - px, 0, y + px * 0.2);
        lg.addColorStop(0, style.fill[0]); lg.addColorStop(1, style.fill[1]);
        ctx.fillStyle = lg;
        ctx.fillText(word, x, y);
      }
      x += wW; wi++;
    }
  }
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = 4;
  return { tex: t, w: c.width, h: c.height };
}

const clouds = [];
function lyricStyle(text, adlib) {
  if (ADLIB_ICE.test(text))  return { adlib, glow: '#54e8ff', fill: ['#eaffff', '#7ae6ff'] };
  if (ADLIB_GOLD.test(text)) return { adlib, glow: '#ffb02e', fill: ['#fff3c4', '#ffc23e'] };
  if (adlib)                 return { adlib, glow: '#e03dff', fill: ['#ffd7f6', '#ff7ae0'] };
  return { adlib, glow: '#ff2ed9', fill: ['#ffffff', '#ffd0f3'] };
}
function spawnLyric(text, dur) {

function redrawLyric(cloud) {
  const { tex } = makeLyricTexture(cloud.text, cloud.shown, cloud.style);
  cloud.sprite.material.map.dispose();
  cloud.sprite.material.map = tex;
}
function updateClouds(dt) {
  for (const c of clouds) {
    c.t += dt;
    c.punch = Math.max(0, c.punch - dt * 4.5);
    const pk = 1 + c.punch * 0.16;

    if (c.state === 'reveal') {
      /* follow the singer */
      const sp = new THREE.Vector3(); singerHead.getWorldPosition(sp);
      c.pos.x = sp.x + 0.15; c.pos.z += (sp.z - c.pos.z) * 0.06;
      c.pos.y += dt * 0.22;
      if (c.shown < c.words) {
        c.tReveal += dt;
        if (c.tReveal >= c.revealEvery) {
          c.tReveal = 0; c.shown++; c.punch = 1; redrawLyric(c);
        }
      } else {
        c.holdT -= dt;
        if (c.holdT <= 0) {
          c.state = 'fly';
          c.vel.set(-SPEED * (0.55 + Math.random() * 0.25), 1.6 + Math.random() * 0.7, (Math.random() - 0.5) * 1.4);
          c.rotVel = (Math.random() - 0.5) * 0.5;
        }
      }
    } else {
      c.pos.addScaledVector(c.vel, dt);
      c.vel.y += dt * 0.25;
      c.sprite.material.rotation += (c.rotVel || 0) * dt;
      if (c.t > 2.2) c.fade -= dt / 2.0;
      if (c.fade <= 0 || c.pos.y > 17) c.dead = true;
    }
    c.sprite.position.copy(c.pos);
    c.sprite.material.opacity = Math.max(0, Math.min(1, c.fade));
    c.sprite.scale.set(c.baseW * pk, c.baseH * pk, 1);
    if (c.dead) { scene.remove(c.sprite); c.sprite.material.map.dispose(); c.sprite.material.dispose(); }
  }
  for (let i = clouds.length - 1; i >= 0; i--) if (clouds[i].dead) clouds.splice(i, 1);
}
function clearClouds() { for (const c of clouds) c.dead = true; updateClouds(0); }

function updatePyramid(dt) {
  const P = pyramid, Y0 = -18, Y1 = 13;

    P.t += dt / 1.6;
    const k = 1 - Math.pow(1 - Math.min(1, P.t), 3);
    P.grp.position.y = Y0 + (Y1 - Y0) * k;
    P.edges.material.opacity = k * 0.85;
    P.grp.rotation.y += dt * 0.05;

  } else if (P.state === 'up') {

    if (P.hold <= 0) { P.state = 'sinking'; P.t = 0; }
  } else if (P.state === 'sinking') {
    P.t += dt / 1.8;
    const k = Math.min(1, P.t);
    P.grp.position.y = Y1 + (Y0 - Y1) * k * k;
    P.edges.material.opacity = (1 - k) * 0.85;

}

    if (o.material) { const m = Array.isArray(o.material) ? o.material : [o.material]; m.forEach(x => { if (x.map) x.map.dispose(); x.dispose(); }); }

}

    f1: 0.11 + Math.random() * 0.1, f2: 0.08 + Math.random() * 0.1, f3: 0.15 + Math.random() * 0.13, f4: 0.05 + Math.random() * 0.07,

function updateEagles(dt, t) {
  for (const e of eagles) {
    /* mostly straight flight near the train: home position + slow low-amplitude drift + gentle forward/back glide (variable speed) */
    const tx = e.hx + Math.sin(t * e.f4 + e.ph) * e.surge + Math.sin(t * e.f1 + e.ph) * e.ax;
    const ty = e.hy + Math.sin(t * e.f3 + e.ph * 1.3) * e.ay;
    const tz = e.hz + Math.sin(t * e.f2 + e.ph * 1.7) * e.az;
    const px = e.pos.x, pz = e.pos.z;
    const k = Math.min(1, dt * e.resp);
    e.pos.x += (tx - e.pos.x) * k;
    e.pos.y += (ty - e.pos.y) * k;
    e.pos.z += (tz - e.pos.z) * k;
    e.g.position.copy(e.pos);
    const vx = e.pos.x - px, vz = e.pos.z - pz;
    const yawTarget = Math.atan2(-vz, Math.abs(vx) + 0.3);   // keep facing roughly forward (+x)
    e.yaw += (yawTarget - e.yaw) * Math.min(1, dt * 2.5);
    e.g.rotation.y = e.yaw;
    e.g.rotation.z = Math.max(-0.4, Math.min(0.4, -vz / Math.max(dt, 0.001) * 0.05));  // gentle bank
    const flap = Math.sin(t * e.flapSp + e.flap) * 0.5 + 0.06;
    e.wings.forEach(wg => wg.w.rotation.x = flap * wg.s);
  }
}

function chuff() {

const cam = { az: 0.42, pol: 1.35, r: 18, tgt: new THREE.Vector3(0.8, 4.4, 0), vaz: 0, vpol: 0 };
const CAM0 = { az: 0.42, pol: 1.35, r: 18 };
let autoCam = true, lastInteract = -99;
const el = renderer.domElement;
const pointers = new Map();
let pinchD = 0;
el.addEventListener('pointerdown', e => {
  pointers.set(e.pointerId, [e.clientX, e.clientY]);
  el.setPointerCapture(e.pointerId);
  document.getElementById('scene').classList.add('dragging');
  if (pointers.size === 2) {
    const p = [...pointers.values()];
    pinchD = Math.hypot(p[0][0] - p[1][0], p[0][1] - p[1][1]);
  }
});
el.addEventListener('pointermove', e => {
  if (!pointers.has(e.pointerId)) return;
  const prev = pointers.get(e.pointerId);
  pointers.set(e.pointerId, [e.clientX, e.clientY]);
  lastInteract = simT;
  if (pointers.size === 1) {
    const dx = e.clientX - prev[0], dy = e.clientY - prev[1];
    cam.vaz = -dx * 0.0042; cam.vpol = -dy * 0.0032;
    cam.az += cam.vaz; cam.pol += cam.vpol;
  } else if (pointers.size === 2) {
    const p = [...pointers.values()];
    const d = Math.hypot(p[0][0] - p[1][0], p[0][1] - p[1][1]);
    if (pinchD > 0) cam.r *= pinchD / d;
    pinchD = d;
  }
  clampCam();
});
const endPointer = e => { pointers.delete(e.pointerId); document.getElementById('scene').classList.remove('dragging'); };
el.addEventListener('pointerup', endPointer);
el.addEventListener('pointercancel', endPointer);
el.addEventListener('wheel', e => {
  e.preventDefault();
  cam.r *= Math.exp(e.deltaY * 0.0011);
  lastInteract = simT;
  clampCam();
}, { passive: false });
function clampCam() {
  /* free orbit, but the y-floor in updateCamera keeps it from going under the ground */
  cam.pol = Math.max(0.06, Math.min(1.98, cam.pol));
  cam.r = Math.max(4.5, Math.min(120, cam.r));
}
function updateCamera(dt, t) {
  if (autoCam && t - lastInteract > 6) cam.az += dt * 0.032;
  if (pointers.size === 0) {
    cam.az += cam.vaz; cam.pol += cam.vpol;
    cam.vaz *= 0.9; cam.vpol *= 0.9;
    clampCam();
  }
  const sp = Math.sin(cam.pol), y = Math.cos(cam.pol);
  camera.position.set(
    cam.tgt.x + cam.r * sp * Math.sin(cam.az),
    Math.max(0.55, cam.tgt.y + cam.r * y),   // never below the ground
    cam.tgt.z + cam.r * sp * Math.cos(cam.az)
  );
  camera.lookAt(cam.tgt);
}

let cueIdx = 0, lastAudioT = 0;
function resyncCues(cur) {
  cueIdx = CUES.findIndex(c => c[0] >= cur - 0.25);
  if (cueIdx < 0) cueIdx = CUES.length;
  clearClouds();
}
function updateCues() {
  const cur = (window.__forceTime != null) ? window.__forceTime : audio.currentTime;
  if (Math.abs(cur - lastAudioT) > 2.5) resyncCues(cur);   // loop restart or seek
  lastAudioT = cur;
  while (cueIdx < CUES.length && CUES[cueIdx][0] <= cur) {
    const [t, text] = CUES[cueIdx];
    const next = CUES[cueIdx + 1];
    if (cur - t < 1.6) {
      const dur = Math.max(1.0, Math.min(3.2, (next ? next[0] : t + 2.5) - t));
      spawnLyric(text, dur);
    }
    cueIdx++;
  }
}

let worldX = 0, smokeT = 0, flickerT = 2.5;
const clock = new THREE.Clock();

function updateTrain(dt, t) {
  worldX += SPEED * dt;
  ties.grp.position.x = -(worldX % ties.SPC);
  poles1.grp.position.x = -(worldX % poles1.SPC);
  poles2.grp.position.x = -(worldX % poles2.SPC);
  grass.grp.position.x = -(worldX % grass.PATCH);

  for (const w of driveWheels) w.g.rotation.z = -worldX / w.r;
  for (const w of smallWheels) w.g.rotation.z = -worldX / w.r;
  for (const r of rods) {
    const a = -worldX / 0.5;
    r.m.position.x = r.x + Math.cos(a) * r.cr;
    r.m.position.y = r.y + Math.sin(a) * r.cr;
  }
  train.position.y = Math.sin(t * 8.2) * 0.012;
  train.rotation.z = Math.sin(t * 5.1) * 0.0035;

  /* smoke */
  smokeT -= dt;
  if (smokeT <= 0) { smokeT = 0.5 + Math.random() * 0.2; spawnPuff(6.15, 3.6, 0); }

  /* sign flicker */
  flickerT -= dt;
  if (flickerT <= 0) {
    flickerT = 2.5 + Math.random() * 4;
    const seq = [0.62, 1, 0.78, 1];
    seq.forEach((v, i) => setTimeout(() => signMats.forEach(m => m.opacity = v), i * 70));
  }
}

function updatePuffs(dt) {
  for (const p of puffs) {
    if (!p.alive) continue;
    p.t += dt;
    if (p.t >= p.life) { p.alive = false; p.m.visible = false; continue; }
    const k = p.t / p.life;
    p.m.position.addScaledVector(p.v, dt);
    p.v.y += dt * 0.06;
    const s = p.s0 + (p.s1 - p.s0) * Math.pow(k, 0.7);
    p.m.scale.setScalar(s);
    p.m.rotation.y += p.rv * dt;
    p.m.material.opacity = k > 0.7 ? 1 - (k - 0.7) / 0.3 : 1;
  }
}

function pickSingerMode() {
  const roll = Math.random();
  if (roll < 0.40) { singerMode = 'strum'; singerModeT = 4 + Math.random() * 5; }
  else if (roll < 0.58) { singerMode = 'hype'; singerModeT = 2.4 + Math.random() * 2; }
  else if (roll < 0.74) { singerMode = 'handsUp'; singerModeT = 2 + Math.random() * 1.6; }
  else if (roll < 0.87) { singerMode = 'point'; singerModeT = 1.8 + Math.random() * 1.4; }
  else { singerMode = 'gunfire'; singerModeT = 2.4 + Math.random() * 1.3; singerShots = 2 + (Math.random() * 2 | 0); singerShotT = 0.45; }
}
function fireSingerShot() {
  const mp = new THREE.Vector3(); singerMuzzle.getWorldPosition(mp);
  spawnBullet(mp.x, mp.y, mp.z, new THREE.Vector3((Math.random() - 0.5) * 0.16, 1, (Math.random() - 0.5) * 0.12), 38 + Math.random() * 8, 0xfff2b0, 1.5);
  singerFlash.visible = true; singerFlash.material.rotation = Math.random() * 3; singerFlashLight.intensity = 34; singerFlashT = 0.06;
  burst(mp.x, mp.y, mp.z, 0xffe6a0, 5);

function updateSinger(dt, t) {
  singerPunch = Math.max(0, singerPunch - dt * 3);
  handRaise = Math.max(0, handRaise - dt);
  singerModeT -= dt;
  if (handRaise > 0.4 && singerMode !== 'gunfire') { singerMode = 'handsUp'; singerModeT = Math.max(singerModeT, 0.4); }
  if (singerModeT <= 0 && singerMode !== 'gunfire') pickSingerMode();

  const groove = Math.sin(t * Math.PI * 2 * 1.16);
  const hype = singerMode === 'hype' ? 1 : 0;
  singer.position.y = 2.8 + Math.abs(groove) * (0.05 + bassS * 0.05 + hype * 0.07);
  singer.rotation.z = groove * (0.05 + hype * 0.04);
  singerHead.rotation.x = Math.sin(t * Math.PI * 2 * 2.33) * 0.09 - singerPunch * 0.22 + (singerMode === 'handsUp' || singerMode === 'gunfire' ? -0.25 : 0);
  singerHead.rotation.z = Math.sin(t * 1.4) * 0.06;

  /* strum-arm pose per move */
  let ax = -0.7, az = 0.5;
  const strumSwing = Math.sin(t * Math.PI * 2 * 2.33) * (0.16 + singerPunch * 0.3 + bassS * 0.12);
  if (singerMode === 'strum') { ax = -0.7; az = 0.5 + strumSwing; }
  else if (singerMode === 'hype') { ax = -1.9; az = 0.2 + Math.sin(t * 10) * 0.5; }
  else if (singerMode === 'handsUp') { ax = -2.7; az = 0.1 + Math.sin(t * 3) * 0.08; }
  else if (singerMode === 'point') { ax = -1.35; az = -0.55; }
  else if (singerMode === 'gunfire') {
    ax = -2.55; az = 0.15; singerGun.visible = true;
    if (singerShots > 0) {
      singerShotT -= dt;
      if (singerShotT <= 0) { fireSingerShot(); singerShots--; singerShotT = 0.3 + Math.random() * 0.14; }
    } else if (singerModeT <= 0) pickSingerMode();
  }
  if (singerMode !== 'gunfire') singerGun.visible = false;

  const lp = Math.min(1, dt * 9);
  strumArm.rotation.x += (ax - strumArm.rotation.x) * lp;
  strumArm.rotation.z += (az - strumArm.rotation.z) * lp;

  if (singerFlashT > 0) { singerFlashT -= dt; if (singerFlashT <= 0) { singerFlash.visible = false; singerFlashLight.intensity = 0; } }

  const sp = new THREE.Vector3(); singerHead.getWorldPosition(sp);
  singerLight.position.set(sp.x, sp.y + 0.25, sp.z + 0.3);

function updateCowboys(dt, t) {
  for (const cb of cowboys) {
    const w = Math.PI * 2 * 2.5;
    const ph = cb.ph;
    cb.g.position.y = Math.abs(Math.sin(t * w * 0.5 + ph)) * 0.16;
    cb.g.rotation.z = Math.sin(t * w * 0.5 + ph + 0.6) * 0.045;
    cb.g.position.x = cb.x0 + Math.sin(t * 0.21 + ph * 2) * 0.8;
    cb.g.position.z = cb.z0 + Math.sin(t * 0.13 + ph) * 0.25;
    for (const l of cb.legs) l.m.rotation.z = Math.sin(t * w + l.ph + ph) * 0.75;

    /* firing state machine */
    cb.recoil = Math.max(0, cb.recoil - dt * 6);
    cb.tState += dt;
    const now = t;
    if (cb.state === 'idle') {
      cb.gunArm.rotation.z += (-0.6 - cb.gunArm.rotation.z) * Math.min(1, dt * 6);
      if (now >= cb.tNext) { cb.state = 'raise'; cb.tState = 0; }
    } else if (cb.state === 'raise') {
      cb.gunArm.rotation.z += (0.38 - cb.gunArm.rotation.z) * Math.min(1, dt * 10);
      if (cb.tState > 0.28) {
        cb.state = 'fire'; cb.tState = 0;
        cb.flash.visible = true; cb.flashLight.intensity = 60;
        cb.flash.material.rotation = Math.random() * 3;
        cb.recoil = 1;
        const mp = new THREE.Vector3(); cb.flash.getWorldPosition(mp);
        spawnPuff(mp.x, mp.y, mp.z, { vx: -SPEED * 0.3, vy: 0.9, vz: 0, s0: 0.1, s1: 0.55, life: 1.1, color: 0x2e2544 });

        spawnBullet(mp.x, mp.y, mp.z, new THREE.Vector3(1, 0.12 + Math.random() * 0.1, (Math.random() - 0.5) * 0.15), 40 + Math.random() * 8, 0xffe08a, 1.9);
        bang();
      }
    } else if (cb.state === 'fire') {
      if (cb.tState > 0.09) { cb.flash.visible = false; cb.flashLight.intensity = 0; }
      cb.gunArm.rotation.z = 0.38 + cb.recoil * 0.22;
      if (cb.tState > 0.5) { cb.state = 'lower'; cb.tState = 0; }
    } else if (cb.state === 'lower') {
      cb.gunArm.rotation.z += (-0.6 - cb.gunArm.rotation.z) * Math.min(1, dt * 5);
      if (cb.tState > 0.5) { cb.state = 'idle'; cb.tNext = t + 4 + Math.random() * 6; }
    }
  }
}

function updateFX(dt, t) {
  goldK = Math.max(0, goldK - dt * 0.8);
  iceK = Math.max(0, iceK - dt * 1.4);
  scene.fog.color.copy(fogBase).lerp(fogIce, iceK * 0.55);

  /* bass-reactive neon */
  if (analyser) {
    analyser.getByteFrequencyData(bins);
    let s = 0; for (let i = 2; i < 10; i++) s += bins[i];
    bass = s / (8 * 255);
  } else bass = 0.35 + 0.15 * Math.sin(t * 4.6);
  bassS += (bass - bassS) * Math.min(1, dt * 9);

  const pulse = 0.95 + bassS * 0.3 + iceK * 0.4;
  matPink.color.setHex(COL.pink).multiplyScalar(pulse);
  matCyan.color.setHex(COL.cyan).multiplyScalar(0.95 + bassS * 0.22 + iceK * 0.8);
  signMats.forEach(m => {
    m.color.setRGB(1.45 + goldK * 0.9 + bassS * 0.25, 1.45 + goldK * 0.55, 1.45 + goldK * 0.1);
  });
  sunSprite.scale.setScalar(112 * (1 + bassS * 0.045));
  sunGlow.scale.setScalar(150 * (1 + bassS * 0.08));

  for (const r of floatRocks) {
    r.m.position.y = r.y0 + Math.sin(t * r.sp * 3 + r.ph) * 1.4;
    r.m.rotation.y += dt * r.sp;
    r.m.rotation.x += dt * r.sp * 0.6;
  }
}

let simT = 0;
function frame(dt) {
  simT += dt;
  const t = simT;

  updateTrain(dt, t);
  updatePuffs(dt);
  updateSinger(dt, t);
  updateCowboys(dt, t);
  updateClouds(dt);
  updateSparks(dt);
  updatePyramid(dt);
  updateRoadProps(dt);
  updateParallax();
  updateShooters(dt);
  updateEagles(dt, t);
  updateMotes(dt, t);
  updateEmbers(dt);
  updateBullets(dt);
  updateFX(dt, t);
  updateEngineSound(dt);
  updateCamera(dt, t);
  if ((started && !audio.paused) || window.__forceTime != null) updateCues();

  if (audio.duration) {
    fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
    timeEl.textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
  }
  composer.render();
}
function tick() {
  requestAnimationFrame(tick);
  frame(Math.min(0.05, clock.getDelta()));
}
tick();

/* --- headless debug hooks (used for automated visual verification) --- */
window.__step = (dt, n = 1) => {
  for (let i = 0; i < n; i++) {
    if (window.__forceTime != null) window.__forceTime += dt;
    frame(dt);
  }
  return simT;
};
window.__snap = () => {
  frame(0);
  const gl = renderer.getContext();
  const w = renderer.domElement.width, h = renderer.domElement.height;
  const px = new Uint8Array(w * h * 4);
  gl.readPixels(0, 0, w, h, gl.RGBA, gl.UNSIGNED_BYTE, px);
  const cnv = document.createElement('canvas'); cnv.width = w; cnv.height = h;
  const ctx = cnv.getContext('2d');
  const img = ctx.createImageData(w, h);
  for (let y = 0; y < h; y++) { const s = (h - 1 - y) * w * 4, d = y * w * 4; img.data.set(px.subarray(s, s + w * 4), d); }
  ctx.putImageData(img, 0, 0);
  return new Promise(res => cnv.toBlob(b => fetch('/snap', { method: 'POST', body: b }).then(() => res('ok')), 'image/png'));
};
window.__fx = {
  volley, pyramidRise, spawnLyric, setCam: (az, pol, r) => Object.assign(cam, { az, pol, r }),
  prop: (key, z) => spawnProp(OBJECT_BUILDERS[key], { z: z != null ? z : 7.5, x: 22 }),
  place: (key, x, z) => spawnProp(OBJECT_BUILDERS[key], { x, z }),
  sign: () => spawnProp(buildAicanfeelSign, { z: -10.5, x: 22 }),
  clearProps: () => { roadProps.forEach(rp => { scene.remove(rp.m); disposeTree(rp.m); }); roadProps.length = 0; },
  singerFire: () => { singerMode = 'gunfire'; singerModeT = 2.6; singerShots = 3; singerShotT = 0.1; },
  setMode: (m) => { singerMode = m; singerModeT = 5; },
  keys: () => Object.keys(OBJECT_BUILDERS),
};
window.__dbg = { THREE, scene, camera, renderer, audio, roadProps, eagles };
</script>
